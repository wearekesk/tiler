name: Release

# Build and publish a multi-arch container image to GHCR when a semver tag is
# pushed (e.g. v1.2.3). A pushed tag is the single source of truth: both
# `gh release create` and the GitHub Releases UI push the tag, so this fires
# exactly once per release. We intentionally do NOT also trigger on
# `release: published` — that fired a second, duplicate build when a release was
# created from a new tag (the tag push and the publish are two separate events).
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

# Never run two builds for the same ref at once (e.g. a re-pushed tag). Queue
# rather than cancel, so an in-flight publish is always allowed to finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # QEMU lets the amd64 runner build the arm64 image too.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            # Only stable tags move `latest`; skip pre-releases like v1.2.3-rc1.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
